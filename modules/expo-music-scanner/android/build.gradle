plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.musicscanner'
version = '0.1.0'

android {
  namespace "expo.modules.musicscanner"
  defaultConfig {
    versionCode 1
    versionName "0.1.0"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'net.jthink:jaudiotagger:3.0.1'
}
